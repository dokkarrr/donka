name: Daily Python Automation

on:
  schedule:
    # Runs at 7:30 AM Bangladesh Time every day
    - cron: '30 7 * * *'
      timezone: 'Asia/Dhaka'
  workflow_dispatch: # Allows manual testing

jobs:
  run-python-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # You can change this to your version

      - name: Install Dependencies
        run: |
          # If you have a requirements.txt, uncomment the line below:
          # pip install -r requirements.txt
          # Or install specific libraries like this:
          # pip install requests pandas 

      - name: Run Script
        run: python extractor.py  # Replace with your actual filename
